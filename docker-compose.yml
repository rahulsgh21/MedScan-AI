version: '3.8'

services:
  backend:
    build: ./backend
    container_name: medscan-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/app/knowledge:/app/app/knowledge
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: medscan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
